version = 1
requires-python = ">=3.10"

[[package]]
name = "email-triage-env"
version = "1.0.0"
source = { virtual = "." }
dependencies = [
  { name = "openenv-core" },
  { name = "fastapi" },
  { name = "uvicorn" },
  { name = "pydantic" },
  { name = "python-multipart" },
  { name = "httpx" },
  { name = "openai" },
  { name = "pyyaml" },
]

[package.metadata]
requires-dist = [
  { name = "openenv-core", specifier = ">=0.2.0" },
  { name = "fastapi", specifier = ">=0.110.0" },
  { name = "uvicorn", extras = ["standard"], specifier = ">=0.29.0" },
  { name = "pydantic", specifier = ">=2.6.0" },
  { name = "python-multipart", specifier = ">=0.0.9" },
  { name = "httpx", specifier = ">=0.27.0" },
  { name = "openai", specifier = ">=1.25.0" },
  { name = "pyyaml", specifier = ">=6.0.1" },
]

[[package]]
name = "openenv-core"
version = "0.2.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "fastapi"
version = "0.110.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "uvicorn"
version = "0.29.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pydantic"
version = "2.6.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "python-multipart"
version = "0.0.9"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "httpx"
version = "0.27.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openai"
version = "1.25.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pyyaml"
version = "6.0.1"
source = { registry = "https://pypi.org/simple" }
